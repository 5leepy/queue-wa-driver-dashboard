<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Monitor Antrean Pangkalan - Green SM</title>
  
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header Aplikasi -->
  <header class="app-header">
    <div class="header-container">
      <div class="brand">
        <div class="brand-logo">
          <i class="fa-solid fa-truck-ramp-box"></i>
        </div>
        <div class="brand-text">
          <h1>GREEN SM</h1>
          <p>Monitor Antrean POI</p>
        </div>
      </div>
      
      <!-- Indicator Status Koneksi WebSocket -->
      <div id="connection-badge" class="connection-badge connecting">
        <span class="dot"></span>
        <span class="badge-text">Menghubungkan...</span>
      </div>
    </div>
  </header>

  <!-- Kontainer Utama -->
  <main class="app-container">
    <!-- Pilihan Pangkalan POI (Tab Navigation) -->
    <section class="poi-selector-section">
      <div id="poi-tabs" class="poi-tabs">
        <!-- Pangkalan akan dimuat secara dinamis disini -->
        <div class="tab-placeholder">Memuat pangkalan...</div>
      </div>
    </section>

    <!-- Info Detail Pangkalan Terpilih -->
    <section class="poi-info-section">
      <div class="poi-info-card">
        <div class="poi-main-info">
          <h2 id="active-poi-name">-</h2>
          <div class="poi-badges">
            <span id="poi-status-badge" class="status-badge offline">TUTUP</span>
            <span id="poi-hours-badge" class="hours-badge">Jam Kerja: --:-- - --:--</span>
          </div>
        </div>
        <div class="poi-meta-grid">
          <div class="meta-item">
            <span class="meta-label">Standby</span>
            <span id="standby-count-value" class="meta-value">0</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Tandon</span>
            <span id="tandon-count-value" class="meta-value">0</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Istirahat</span>
            <span id="rest-count-value" class="meta-value">0</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Barisan Antrean -->
    <section class="queue-section">
      <!-- Tab Antrean: Standby vs Tandon -->
      <div class="queue-tabs">
        <button id="tab-btn-standby" class="queue-tab-btn active" onclick="switchQueueTab('standby')">
          <i class="fa-solid fa-circle-check"></i> Baris Standby
        </button>
        <button id="tab-btn-tandon" class="queue-tab-btn" onclick="switchQueueTab('tandon')">
          <i class="fa-solid fa-hourglass-half"></i> Baris Tandon
        </button>
      </div>

      <!-- List Antrean Standby -->
      <div id="queue-list-standby" class="queue-list-container active">
        <!-- Antrean standby akan di-render di sini -->
        <div class="loading-state">
          <i class="fa-solid fa-circle-notch fa-spin"></i>
          <p>Memuat daftar antrean...</p>
        </div>
      </div>

      <!-- List Antrean Tandon -->
      <div id="queue-list-tandon" class="queue-list-container">
        <!-- Antrean tandon akan di-render di sini -->
        <div class="loading-state">
          <i class="fa-solid fa-circle-notch fa-spin"></i>
          <p>Memuat daftar antrean...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer Info / Semboyan -->
  <footer class="app-footer">
    <p>🟢 IJO PASTI CUAN 🟢</p>
    <p class="footer-sub">Perbarui otomatis via WebSocket • Hak Cipta &copy; 2026</p>
  </footer>

  <!-- Setup Configurations Modal (Tersembunyi, klik logo 5x untuk buka) -->
  <div id="config-modal" class="modal-overlay">
    <div class="modal-card">
      <h3>Pengaturan Koneksi API</h3>
      <div class="form-group">
        <label for="input-api-url">HTTP API URL</label>
        <input type="text" id="input-api-url" placeholder="https://api.nadir.my.id">
      </div>
      <div class="form-group">
        <label for="input-ws-url">WebSocket URL</label>
        <input type="text" id="input-ws-url" placeholder="wss://ws.nadir.my.id">
      </div>
      <div class="modal-actions">
        <button onclick="closeConfigModal()" class="btn-cancel">Batal</button>
        <button onclick="saveConfigurations()" class="btn-save">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Custom Controller Script -->
  <script src="app.js"></script>
</body>
</html>
